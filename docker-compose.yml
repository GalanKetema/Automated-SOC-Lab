version: '3.8'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - soc_network

  cassandra:
    image: cassandra:4.0
    container_name: cassandra
    networks:
      - soc_network

  thehive:
    image: strangebee/thehive:5.2
    container_name: thehive
    depends_on:
      - elasticsearch
      - cassandra
    ports:
      - "9000:9000"
    environment:
      - JVM_OPTS=-Xms1024M -Xmx1024M
    command:
      - --secret
      - "mySecretPassword123"
      - "--cql-hostnames"
      - "cassandra"
      - "--index-backend"
      - "elasticsearch"
      - "--es-hostnames"
      - "elasticsearch"
    networks:
      - soc_network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - soc_network

networks:
  soc_network:
    driver: bridge

volumes:
  n8n_data: